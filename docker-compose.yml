services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    expose:
      - "3000"
    volumes:
      - ./newapi/data:/data
      - ./newapi/logs:/app/logs
    environment:
      SQL_DSN: "postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-change-your-password}@postgres:5432/${POSTGRES_DB:-new-api}"
      REDIS_CONN_STRING: redis://redis:6379
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cpa:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://localhost:3000/api/status || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - newapi-network

  cpa:
    image: eceasy/cli-proxy-api:latest
    container_name: cpa
    restart: always
    ports:
      - "9999:8317"
    environment:
      PGSTORE_DSN: "postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-change-your-password}@postgres:5432/${POSTGRES_DB:-new-api}"
      PGSTORE_SCHEMA: cpa
      PGSTORE_LOCAL_PATH: /CLIProxyAPI
      MANAGEMENT_PASSWORD: "${CPA_MANAGEMENT_PASSWORD:-change-your-password}"
      TZ: Asia/Shanghai
    volumes:
      - ./cpa/pgstore:/CLIProxyAPI/pgstore
      - ./cpa/logs:/CLIProxyAPI/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - newapi-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newapi-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-root}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-your-password}"
      POSTGRES_DB: "${POSTGRES_DB:-new-api}"
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - newapi-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      new-api:
        condition: service_healthy
    networks:
      - newapi-network

volumes:
  pg_data:

networks:
  newapi-network:
    driver: bridge
